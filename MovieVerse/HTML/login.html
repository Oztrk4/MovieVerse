  <!-- Tüm sayfayı kaplayan bölüm -->
 <div class="login-page">
    
    <!-- İçerikleri saran katman -->
    <div class="login-wrapper">
      
      <!-- Başlık ve kartların bulunduğu ana bölüm -->
      <div class="login-content-area">
        
        <!-- Log In / Sign Up sekme başlığı -->
        <h6 class="tab-switch-title">
          <span>Log In</span>
          <span>Sign Up</span>
        </h6>

        <!-- 3D kart dönüşümünü tetikleyen checkbox -->
        <input
          type="checkbox"
          id="reg-log"
          name="reg-log"
          class="checkbox"
        >
        <label for="reg-log"></label>

        <!-- 3D Kart Dış Sarmalayıcı -->
        <div class="card-3d-wrap">
          <div class="card-3d-wrapper">
            
            <!-- (Ön Yüz) Log In Formu -->
            <div class="card-front">
              <div class="center-wrap">
                <div class="form-section">
                  <h4 class="form-title">Log In</h4>
                  
                  <!-- E-posta -->
                  <div class="form-group">
                    <input
                      type="email"
                      name="logemail"
                      id="logemail"
                      autocomplete="off"
                      placeholder="Your Email"
                      class="form-style"
                    >
                    <i class="input-icon uil uil-at"></i>
                  </div>
                  
                  <!-- Parola -->
                  <div class="form-group margin-top">
                    <input
                      type="password"
                      name="logpass"
                      id="logpass"
                      autocomplete="off"
                      placeholder="Your Password"
                      class="form-style"
                    >
                    <i class="input-icon uil uil-lock-alt"></i>
                  </div>
                  
                  <!-- Giriş butonu -->
                  <a href="#" class="btn margin-top">submit</a>
                  
                  <!-- Şifre Hatırlatma -->
                  <p class="info-text margin-top">
                    <a href="#0" class="link-override">Forgot your password?</a>
                  </p>
                </div>
              </div>
            </div>
            
            <!-- (Arka Yüz) Sign Up Formu -->
            <div class="card-back">
              <div class="center-wrap">
                <div class="form-section">
                  <h4 class="form-title">Sign Up</h4>
                  
                  <!-- İsim Soyisim -->
                  <div class="form-group">
                    <input
                      type="text"
                      name="logname"
                      id="logname"
                      autocomplete="off"
                      placeholder="Your Full Name"
                      class="form-style"
                    >
                    <i class="input-icon uil uil-user"></i>
                  </div>
                  
                  <!-- E-posta -->
                  <div class="form-group margin-top">
                    <input
                      type="email"
                      name="logemail"
                      id="logemail2"
                      autocomplete="off"
                      placeholder="Your Email"
                      class="form-style"
                    >
                    <i class="input-icon uil uil-at"></i>
                  </div>
                  
                  <!-- Parola -->
                  <div class="form-group margin-top">
                    <input
                      type="password"
                      name="logpass"
                      id="logpass2"
                      autocomplete="off"
                      placeholder="Your Password"
                      class="form-style"
                    >
                    <i class="input-icon uil uil-lock-alt"></i>
                  </div>
                  
                  <!-- Kayıt Butonu -->
                  <a href="#" class="btn margin-top">submit</a>
                </div>
              </div>
            </div>

          </div>
        </div> <!-- card-3d-wrap sonu -->

      </div> <!-- login-content-area sonu -->

    </div> <!-- login-wrapper sonu -->

  </div> <!-- login-page sonu -->
